<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <style>
    :root {
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      --primary: #2ec27e; 
      --accent: #3584e4;  
      --bg-color: #1e1e1e;
      --bg-pattern: radial-gradient(#2b2b2b 1px, transparent 1px);
      --bg-size: 24px 24px;
      --surface: #2d2d2d;  
      --header-bg: #303030;
      --border: #1e1e1e;
      --text-main: #dedede;
      --text-muted: #929292;
    }

    html {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      background-color: var(--bg-color);
      background-image: var(--bg-pattern);
      background-size: var(--bg-size);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-main);
    }

    header {
      background: var(--header-bg);
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--surface);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 500px;
      width: 100%;
      border: 1px solid var(--border); 
    }

    label {
      display: block;
      margin-bottom: 15px;
      font-weight: bold;
      color: var(--text-main);
    }

    input[type="file"] {
      margin-bottom: 20px;
      display: block;
      width: 100%;
      color: var(--text-muted);
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease;
      font-family: inherit;
    }

    .btn:hover:not(:disabled) {
      background: #4b8fe3; 
    }

    .btn:active:not(:disabled) {
      background: #2666b5; 
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.download {
      margin-top: 20px;
      background: var(--primary);
    }

    .btn.download:hover:not(:disabled) {
      background: #57d48f;
    }

    .btn.download:active:not(:disabled) {
      background: #26a269;
    }

    #result {
      margin-top: 30px;
      text-align: center;
      max-width: 100%;
    }

    #result img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #333 0% 50%) 0 0 / 20px 20px;
    }

    .error {
      color: #e01b24;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>Image Background Remover</header>

  <main>
    <div class="card">
      <label for="file">Upload image:</label>
      <input type="file" id="file" accept="image/*">
      <button id="btn" class="btn" onclick="removeBg()">Remove background</button>
    </div>
    <div id="result"></div>
  </main>

  <footer>TactiQwl &copy; 2026</footer>

  <script>
    const fileInput = document.getElementById('file');
    const resultDiv = document.getElementById('result');
    const btn = document.getElementById('btn');

    async function removeBg() {
      const file = fileInput.files[0];
      
      if (!file) {
        return resultDiv.innerHTML = '<p class="error">Please select an image.</p>';
      }

      const baseName = file.name.includes('.') 
        ? file.name.substring(0, file.name.lastIndexOf('.')) 
        : file.name;
      const outputName = `${baseName}-nobg.png`;

      const formData = new FormData();
      formData.append('image_file', file);

      btn.disabled = true;
      resultDiv.innerHTML = '<p>Processing...</p>';

      try {
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': 'EUxiqEScPmMNJy86Zn8EUa5o' },
          body: formData
        });

        if (!res.ok) throw new Error('Failed to process image');
        
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        
        resultDiv.innerHTML = `
          <img src="${url}" alt="Result">
          <br>
          <a href="${url}" download="${outputName}" class="btn download">Download</a>
        `;
      } catch (err) {
        resultDiv.innerHTML = `<p class="error">${err.message}</p>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
